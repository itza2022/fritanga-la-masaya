  <style>
    body {

      background: #000;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center; /* 👈 centra todo */
    }

    .contenedor {
      width: 100%;
      max-width: 480px; /* 👈 simula ancho de celular */

      font-size: 32px; /* 👈 grande pero equilibrado */

      text-align: center;
    }

    .boton:hover {
      background: #e66a00;
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <img src="menu.jpeg" alt="Menú">

    <a class="boton" href="https://wa.me/50557499209" target="_blank">

    </a>

</html>
