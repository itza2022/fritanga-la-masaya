  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    img {
      height: 100vh;       /* 👈 CLAVE: ocupa toda la pantalla */
      width: auto;         /* 👈 mantiene proporción */
      display: block;
    }

    .boton {
      width: 100%;
      max-width: 700px;
      padding: 40px 0;
      background: #ff7a00;
      color: white;
      text-decoration: none;
      font-size: 50px;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }

    /* 📱 En celular */
    @media (max-width: 768px) {
      img {
        width: 100%;
        height: auto; /* vuelve a comportamiento normal */
      }

      .boton {
        width: 100%;
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <img src="menu.jpeg" alt="Menú">
